name: CI

on:
  push:
  pull_request:

# Cancela corridas viejas del mismo ref cuando llega un push nuevo.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # No corremos Electron en CI (solo lo compilamos con tsc), así que
          # evitamos bajar su binario (~100MB) y aceleramos el install.
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
